name: Astro build

on:
  push:
    branches:
      - main
    paths-ignore:
      - ".github/**"
      - "README.md"
      - "LICENSE"
      - "renovate.json"
      - ".claude/**"
  pull_request:
    paths-ignore:
      - ".github/**"
      - "README.md"
      - "LICENSE"
      - "renovate.json"
      - ".claude/**"
  schedule:
    - cron: "5 1 * * *" # Run nightly
  workflow_dispatch:

jobs:
  testing:
    name: Astro build
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: ".node-version"

      - name: Run make clean
        run: make clean

      - name: Run make init
        run: make init

      - name: Run make format-check
        run: make format-check

      - name: Run make lint
        run: make lint

      - name: Run make check
        run: make check

      - name: Run make build
        run: make build
