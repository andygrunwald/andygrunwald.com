name: Astro build

on:
  push:
    branches:
      - main
    paths-ignore:
      - ".github/**"
      - "README.md"
      - "LICENSE"
      - "renovate.json"
      - ".claude/**"
  pull_request:
    paths-ignore:
      - ".github/**"
      - "README.md"
      - "LICENSE"
      - "renovate.json"
      - ".claude/**"
  schedule:
    - cron: "5 1 * * *" # Run nightly
  workflow_dispatch:

jobs:
  testing:
    name: Astro build
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".node-version"

      - name: Run make clean
        run: make clean

      - name: Run make init
        run: make init

      - name: Run make check
        run: make check

      - name: Run make build
        run: make build
