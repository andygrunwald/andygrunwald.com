name: Astro build

on:
  push:
    branches:
      - main
    paths-ignore:
      - '.github/**'
      - 'README.md'
      - 'LICENSE'
      - 'renovate.json'
      - '.claude/**'
  pull_request:
    paths-ignore:
      - '.github/**'
      - 'README.md'
      - 'LICENSE'
      - 'renovate.json'
      - '.claude/**'
  schedule:
    - cron: "5 1 * * *" # Run nightly
  workflow_dispatch:

jobs:
  testing:
    name: Astro build
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-node@v6.3.0
        with:
          node-version-file: ".node-version"

      - name: Run make clean
        run: make clean

      - name: Run make init
        run: make init

      - name: Run make build
        run: make build
